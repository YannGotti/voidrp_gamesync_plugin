name: VoidRpGameSync
version: 1.3.0
main: ru.voidrp.gamesync.VoidRpGameSyncPlugin
api-version: "1.21"
depend:
  - Vault
softdepend:
  - LuckPerms
  - WorldGuard
  - SkinsRestorer
  - EconomyShopGUI
  - EconomyShopGUI-Premium

commands:
  vrgs:
    description: VoidRP GameSync admin command
    usage: /vrgs
    permission: voidrp.gamesync.admin
  nationdonate:
    description: Donate your money to your nation treasury
    usage: /nationdonate <amount> [comment]
    permission: voidrp.gamesync.donate
    aliases: [ndonate]
  nationtreasury:
    description: Show current nation treasury summary
    usage: /nationtreasury
    permission: voidrp.gamesync.treasury.view
    aliases: [ntreasury]
  nationtreasuryhistory:
    description: Show nation treasury history
    usage: /nationtreasuryhistory
    permission: voidrp.gamesync.treasury.view
    aliases: [ntreasuryhistory]
  nationwithdraw:
    description: Withdraw nation treasury funds
    usage: /nationwithdraw <amount> [comment]
    permission: voidrp.gamesync.treasury.manage
    aliases: [nwithdraw]
  marketprice:
    description: Show current VoidRP market price
    usage: /marketprice [material]
    permission: voidrp.market.price
    aliases: [mprice, price]
  nmarket:
    description: VoidRP nation market
    usage: /nmarket
    permission: voidrp.nmarket.use
    aliases: [nationmarket, nm]

permissions:
  voidrp.gamesync.admin:
    default: op
  voidrp.gamesync.donate:
    default: true
  voidrp.gamesync.treasury.view:
    default: true
  voidrp.gamesync.treasury.manage:
    default: op
  voidrp.market.price:
    default: true
  voidrp.nmarket.use:
    default: true
  voidrp.nmarket.sell:
    default: true
  voidrp.nmarket.admin:
    default: op
